name: Deploy PWA to GitHub Pages

# Builds the static export and publishes it to GitHub Pages.
# Assumes this runs in the `anaj-bahi` repo, so the production basePath is
# `/anaj-bahi` and the final URL is https://<owner>.github.io/anaj-bahi/.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deploy at a time; a newer push supersedes an in-flight run.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          # Match the repo's local pnpm (11.x). pnpm 9 rejects the settings-only
          # frontend/pnpm-workspace.yaml ("packages field missing or empty");
          # pnpm 11 reads its `allowBuilds` setting and installs cleanly.
          version: 11

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build static export (production basePath /anaj-bahi)
        env:
          NEXT_PUBLIC_BASE_PATH: /anaj-bahi
        run: pnpm build:pages

      - name: Disable Jekyll processing
        run: touch out/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/out

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
